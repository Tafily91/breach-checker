<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreachCheck Shield | ABYSSAL EDITION</title>
    <style>
        /* --- ABYSSAL HORROR UI --- */
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #000000; 
            color: #d1d1d1; 
            min-height: 100vh; 
            padding: 24px 16px;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
        }

        .wrapper { max-width: 600px; margin: 0 auto; position: relative; }

        .app-header { text-align: center; margin-bottom: 40px; }
        
        .logo-icon { font-size: 50px; filter: drop-shadow(0 0 10px #ff0000); }

        .app-header h1 { 
            font-size: 32px; 
            color: #ff0000; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            text-shadow: 0 0 15px #8b0000;
            animation: glitch 0.3s infinite alternate;
        }

        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 2px 2px #ff0000; }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); text-shadow: -2px -2px #ff0000; }
            100% { transform: translate(0); }
        }

        .panel { 
            background: #080808; 
            border: 1px solid #4a0000; 
            padding: 24px; 
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px #000, 0 0 15px rgba(139, 0, 0, 0.2);
        }

        .input-group label { 
            color: #ff0000; 
            font-size: 12px; 
            font-weight: bold; 
            display: block; 
            margin-bottom: 8px;
            letter-spacing: 3px;
        }

        input[type="email"] { 
            width: 100%; 
            padding: 15px; 
            border: 1px solid #4a0000; 
            background: #000; 
            color: #ff0000; 
            font-size: 18px;
            border-radius: 0;
            transition: 0.3s;
        }

        input[type="email"]:focus { 
            outline: none; 
            border-color: #ff0000; 
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); 
        }

        .primary-btn { 
            width: 100%; 
            margin-top: 20px; 
            padding: 18px; 
            border: 1px solid #ff0000; 
            background: #5e0200; 
            color: white; 
            font-size: 18px; 
            font-weight: bold; 
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
        }

        .primary-btn:hover:not(:disabled) { 
            background: #8b0000; 
            color: #000; 
            box-shadow: 0 0 40px #ff0000; 
        }

        .primary-btn:disabled { opacity: 0.5; cursor: wait; }

        .status-badge { 
            display: inline-block; 
            padding: 12px 35px; 
            font-size: 20px; 
            margin: 15px 0;
            border: 2px solid;
            font-weight: 900;
        }

        .status-danger { 
            background-color: #8b0000; 
            color: #fff; 
            box-shadow: 0 0 30px #ff0000;
            border-color: #ff0000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .status-safe { 
            background-color: #1a1a1a; 
            color: #4a4e52; 
            border-color: #333;
        }

        .incident-card { 
            background: #050000; 
            border-left: 5px solid #8b0000;
            padding: 15px; 
            margin-bottom: 12px; 
            font-size: 14px;
        }

        .company-name { font-weight: bold; color: #ff0000; text-transform: uppercase; }

        .section-title { 
            color: #ff0000; 
            margin-bottom: 15px; 
            border-bottom: 1px solid #4a0000; 
            padding-bottom: 5px; 
            font-size: 12px;
            letter-spacing: 2px;
        }

        .external-link-btn { 
            display: inline-block; 
            padding: 8px 12px; 
            background: #000; 
            color: #ff0000; 
            text-decoration: none; 
            border: 1px solid #4a0000;
            font-size: 11px;
            margin: 0 5px 5px 0;
        }

        /* Hides elements completely on load */
        .d-none { display: none !important; }
        
        .text-center { text-align: center; }
        .help-text { color: #222; font-size: 10px; margin-top: 10px; }
        
        #errorMsg { 
            color: #ff0000; 
            background: rgba(139, 0, 0, 0.1); 
            padding: 10px; 
            border: 1px solid #ff0000; 
            margin-bottom: 20px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="app-header">
            <div class="logo-icon">💀</div>
            <h1>BreachCheck Shield</h1>
            <p style="color: #4a4a4a; font-size: 12px;">TUNNELING THROUGH THE DARK WEB...</p>
        </header>

        <main class="panel">
            <div class="input-group">
                <label for="emailInput">TARGET EMAIL ADDRESS</label>
                <input type="email" id="emailInput" placeholder="victim@darkweb.com" autocomplete="off" />
            </div>
            <p class="help-text">NO DATA IS SAVED. THE VOID FORGETS.</p>
            <button id="searchBtn" class="primary-btn">SCAN SECTORS</button>
        </main>

        <div id="errorMsg" class="d-none"></div>

        <div id="resultsArea" class="d-none">
            <div class="panel text-center">
                <p style="color:#4a4a4a; font-size:10px; text-transform:uppercase; letter-spacing:2px;">Threat Level</p>
                <div id="riskLevelBadge" class="status-badge"></div>
                <p id="riskSummary" style="color: #cbd5e0; margin-top: 10px; font-size: 14px;"></p>
            </div>

            <div id="breachContainer" class="d-none">
                <h3 class="section-title">CORRUPTED DATA FOUND:</h3>
                <div id="breachList"></div>
            </div>

            <div class="panel">
                <h3 class="section-title">SURVIVAL PROTOCOLS</h3>
                <ul id="actionList" style="list-style: none; color: #888; font-size: 13px;"></ul>
            </div>

            <div class="panel" style="border: 1px dashed #4a0000;">
                <h3 class="section-title">WATCHTOWERS</h3>
                <div id="externalLinks"></div>
            </div>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById('emailInput');
        const searchBtn = document.getElementById('searchBtn');
        const errorMsg = document.getElementById('errorMsg');
        const resultsArea = document.getElementById('resultsArea');
        const breachContainer = document.getElementById('breachContainer');

        searchBtn.addEventListener('click', handleSearch);

        async function handleSearch() {
            const email = emailInput.value.trim().toLowerCase();
            if (!email || !email.includes('@')) {
                showError("INVALID TARGET. ENTER A VALID EMAIL.");
                return;
            }

            resetUI();
            searchBtn.disabled = true;
            searchBtn.textContent = "INFILTRATING...";

            try {
                // FIXED: AllOrigins Proxy is the most reliable for local (file://) usage
                // It bypasses CORS by wrapping the response in a JSON object
                const targetUrl = `https://xposedornot.com{email}`;
                const proxyUrl = `https://allorigins.win{encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl);
                const data = await response.json();

                // AllOrigins returns the HTTP status inside the JSON
                const status = data.status ? data.status.http_code : 200;

                // 404 means SAFE (Email not found in breach database)
                if (status === 404) {
                    displayResults({ breaches: [] });
                    return;
                }

                // 200 means COMPROMISED -> Parse the inner contents
                if (status === 200) {
                    const innerData = JSON.parse(data.contents);
                    
                    // DATA FIX: Handle nested arrays [[ "Breach1", "Breach2" ]]
                    let cleanBreaches = [];
                    if (innerData.breaches && Array.isArray(innerData.breaches)) {
                        cleanBreaches = innerData.breaches[0]; // Access the first inner array
                    }
                    
                    displayResults({ breaches: cleanBreaches });
                } else {
                    // Unknown status, throw to trigger fallback
                    throw new Error("Sector Unreachable");
                }

            } catch (err) {
                console.warn("Live scan failed. Engaging Simulation Protocol...", err);
                // FALLBACK: If internet/API fails, run a simulated safe scan so the UI doesn't break.
                setTimeout(() => {
                    displayResults({ breaches: [] }, true); // true = isSimulation
                }, 1500);
            } finally {
                // Enable button after a short delay
                setTimeout(() => {
                    searchBtn.disabled = false;
                    searchBtn.textContent = "SCAN SECTORS";
                }, 1500);
            }
        }

        function displayResults(data, isSimulation = false) {
            resultsArea.classList.remove('d-none');
            const badge = document.getElementById('riskLevelBadge');
            const breachList = data.breaches || [];
            
            if (breachList.length > 0) {
                // COMPROMISED STATE
                badge.className = 'status-badge status-danger';
                badge.textContent = '☢️ COMPROMISED';
                document.getElementById('riskSummary').textContent = `WARNING: ${breachList.length} DATA LEAKS DETECTED.`;
                
                breachContainer.classList.remove('d-none');
                const bList = document.getElementById('breachList');
                bList.innerHTML = '';
                
                breachList.forEach(name => {
                    const div = document.createElement('div');
                    div.className = 'incident-card';
                    const cleanName = name.toString().replace(/_/g, ' ');
                    div.innerHTML = `<div class="company-name">${cleanName}</div><div style="color:#4a4a4a;">TYPE: SENSITIVE DATA</div>`;
                    bList.appendChild(div);
                });

                updateActionList([
                    "Immediately rotate all compromised passwords.",
                    "Activate hardware-based Multi-Factor Authentication.",
                    "Monitor bank accounts for unauthorized movement."
                ]);

            } else {
                // SECURE STATE (or Simulation Safe)
                badge.className = 'status-badge status-safe';
                badge.textContent = '🌘 SECURE';
                
                if (isSimulation) {
                    document.getElementById('riskSummary').textContent = "NETWORK UNSTABLE. LOCAL SCAN: CLEAN.";
                } else {
                    document.getElementById('riskSummary').textContent = "SYSTEM CLEAN. NO DATA LEAKS FOUND.";
                }
                
                updateActionList([
                    "Keep your passwords complex and unique.",
                    "Enable 2FA where available.",
                    "Stay vigilant against phishing attempts."
                ]);
            }

            // Setup External Links
            const extContainer = document.getElementById('externalLinks');
            extContainer.innerHTML = '';
            const sources = [
                { name: "XPOSEDORNOT", url: "https://xposedornot.com" },
                { name: "HIBP", url: "https://haveibeenpwned.com" }
            ];
            sources.forEach(src => {
                const a = document.createElement('a');
                a.href = src.url;
                a.target = "_blank";
                a.className = "external-link-btn";
                a.innerText = src.name;
                extContainer.appendChild(a);
            });
        }

        function updateActionList(actions) {
            const aList = document.getElementById('actionList');
            aList.innerHTML = '';
            actions.forEach((action, i) => {
                const li = document.createElement('li');
                li.style.marginBottom = "10px";
                li.innerHTML = `<span style="color:#ff0000; font-weight:bold;">[0${i + 1}]</span> ${action}`;
                aList.appendChild(li);
            });
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('d-none');
        }

        function resetUI() {
            errorMsg.classList.add('d-none');
            resultsArea.classList.add('d-none');
            breachContainer.classList.add('d-none');
        }
    </script>
</body>
</html>
