<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreachCheck Shield | Horror Edition</title>
    <meta name="description" content="Check if your email was exposed in major data breaches">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        /* --- HORROR THEME STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #000000;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .wrapper { max-width: 600px; margin: 0 auto; }

        .app-header { text-align: center; margin-bottom: 35px; }
        
        .app-header h1 {
            font-size: 28px;
            color: #850111;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #ff073a; }
            2% { text-shadow: -2px -2px #ff073a; }
            4% { text-shadow: 2px 2px #ff073a; }
            95% { text-shadow: none; }
        }

        .app-header p { color: #718096; font-size: 14px; margin-top: 10px; }

        .panel {
            background-color: rgba(133, 1, 17, 0.05);
            border: 1px solid rgba(133, 1, 17, 0.4);
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .input-group label { color: #850111; font-size: 14px; font-weight: bold; display: block; margin-bottom: 8px; }
        
        input[type="email"] {
            width: 100%; padding: 15px; border-radius: 4px; 
            border: 1px solid #850111; background: #000; color: #ff073a; font-size: 16px;
        }
        
        input[type="email"]:focus { outline: none; border-color: #ff073a; box-shadow: 0 0 10px #ff073a; }

        .primary-btn {
            width: 100%; margin-top: 20px; padding: 15px; border-radius: 4px; border: 1px solid #ff073a;
            background: #850111; color: white; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: all 0.2s ease;
        }

        .primary-btn:hover { background: #ff073a; color: black; box-shadow: 0 0 20px #ff073a; }

        .status-badge { display: inline-block; padding: 6px 20px; border-radius: 4px; font-weight: bold; font-size: 18px; margin: 10px 0; }
        .status-danger { background-color: #ff073a; color: black; box-shadow: 0 0 15px #ff073a; }
        .status-safe { background-color: #2f855a; color: white; }

        .incident-card { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(133, 1, 17, 0.3); padding: 15px; margin-bottom: 12px; }
        .company-name { font-weight: bold; color: #ff073a; }
        .section-title { color: #850111; margin-bottom: 15px; border-bottom: 1px solid #850111; padding-bottom: 5px; }

        .external-link-btn {
            display: inline-block; padding: 8px 12px; background: transparent;
            color: #ff073a; text-decoration: none; border-radius: 4px; font-size: 12px;
            font-weight: bold; border: 1px solid #ff073a; margin-right: 5px; margin-bottom: 5px;
        }

        .d-none { display: none; }
        .text-center { text-align: center; }
        .help-text { color: #4a5568; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="app-header">
            <div class="logo-icon">💀</div>
            <h1>BreachCheck Shield</h1>
            <p>Scanning the dark web for your digital footprint...</p>
        </header>

        <main class="panel">
            <div class="input-group">
                <label for="emailInput">TARGET EMAIL</label>
                <input type="email" id="emailInput" placeholder="victim@domain.com" autocomplete="email" />
            </div>
            <p class="help-text">Search is encrypted. We don't save your data.</p>
            <button id="searchBtn" class="primary-btn">SCAN DATABASE</button>
        </main>

        <div id="errorMsg" style="color: #ff073a; background: rgba(255,7,58,0.1); padding: 10px; border: 1px solid #ff073a; margin-bottom: 20px;" class="d-none"></div>

        <div id="resultsArea" class="d-none">
            <div class="panel text-center">
                <p style="color:#718096; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Security Status</p>
                <div id="riskLevelBadge" class="status-badge"></div>
                <p id="riskSummary" style="color: #cbd5e0; margin-top: 10px;"></p>
            </div>

            <div id="breachContainer" class="d-none">
                <h3 class="section-title">EXPOSED IN THESE LEAKS:</h3>
                <div id="breachList"></div>
            </div>

            <div class="panel" style="border: 1px dashed #ff073a;">
                <h3 class="section-title">DEEP SCAN SOURCES</h3>
                <div id="externalLinks"></div>
            </div>

            <div class="panel">
                <h3 class="section-title">REQUIRED ACTIONS</h3>
                <ul id="actionList" style="list-style: none; color: #a0aec0;"></ul>
            </div>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById('emailInput');
        const searchBtn = document.getElementById('searchBtn');
        const errorMsg = document.getElementById('errorMsg');
        const resultsArea = document.getElementById('resultsArea');
        const breachContainer = document.getElementById('breachContainer');

        searchBtn.addEventListener('click', handleSearch);

        async function handleSearch() {
            const email = emailInput.value.trim().toLowerCase();
            if (!email || !email.includes('@')) {
                showError("ENTER A VALID TARGET EMAIL.");
                return;
            }

            resetUI();
            searchBtn.disabled = true;
            searchBtn.textContent = "INFILTRATING...";

            try {
                // --- FIXED API URL AND HOST ---
                const url = `https://rapidapi.com{email}`;
                const options = {
                    method: 'GET',
                    headers: {
                        'x-rapidapi-key': 'ee1a473e11msh87ad17ac3c0f6d4p1cb247jsnc9c3b6ea069f',
                        'x-rapidapi-host': '://rapidapi.com'
                    }
                };

                const response = await fetch(url, options);
                const result = await response.json();

                const responseData = {
                    risk: result.success && result.result && result.result.length > 0 ? "High" : "Low",
                    summary: result.success && result.result && result.result.length > 0 
                        ? `WE FOUND ${result.result.length} EXPOSURES.` 
                        : "NOT FOUND IN THIS SECTOR.",
                    breaches: result.result ? result.result.map(b => ({ company: b.source, data: "Email/Passwords" })) : [],
                    actions: [
                        "Purge affected passwords.",
                        "Enable 2FA hardware keys.",
                        "Monitor financial accounts."
                    ]
                };

                displayResults(responseData);
            } catch (err) {
                console.error(err);
                showError("SYSTEM FAILURE. CHECK CONNECTION OR API LIMITS.");
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = "SCAN DATABASE";
            }
        }

        function displayResults(data) {
            resultsArea.classList.remove('d-none');
            const badge = document.getElementById('riskLevelBadge');
            badge.className = 'status-badge ' + (data.risk === 'High' ? 'status-danger' : 'status-safe');
            badge.textContent = data.risk === 'High' ? '⚠️ COMPROMISED' : '✅ SECURE';
            document.getElementById('riskSummary').textContent = data.summary;

            const bList = document.getElementById('breachList');
            bList.innerHTML = '';
            if (data.breaches.length > 0) {
                breachContainer.classList.remove('d-none');
                data.breaches.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'incident-card';
                    div.innerHTML = `<div class="company-name">${item.company}</div><div style="font-size:13px; color:#718096;">EXPOSED: ${item.data}</div>`;
                    bList.appendChild(div);
                });
            }

            const extContainer = document.getElementById('externalLinks');
            extContainer.innerHTML = '';
            const sources = [
                { name: "FIREFOX", url: "https://firefox.com" },
                { name: "AVAST", url: "https://avast.com" },
                { name: "HIBP", url: "https://haveibeenpwned.com" }
            ];
            sources.forEach(src => {
                const a = document.createElement('a');
                a.href = src.url; a.target = "_blank"; a.className = "external-link-btn";
                a.innerText = src.name;
                extContainer.appendChild(a);
            });

            const aList = document.getElementById('actionList');
            aList.innerHTML = '';
            data.actions.forEach((action, i) => {
                const li = document.createElement('li');
                li.style.marginBottom = "10px";
                li.innerHTML = `<span style="color:#ff073a; font-weight:bold;">[0${i + 1}]</span> ${action}`;
                aList.appendChild(li);
            });
        }

        function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.remove('d-none'); }
        function resetUI() { errorMsg.classList.add('d-none'); resultsArea.classList.add('d-none'); breachContainer.classList.add('d-none'); }
    </script>
</body>
</html>
